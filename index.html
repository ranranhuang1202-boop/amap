*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#1c1f26;color:#c8cdd6}
.page{height:100%;height:100dvh;display:flex;flex-direction:column;background:radial-gradient(ellipse 70% 55% at 35% 40%,#2a3140 0%,transparent 70%),#1c1f26}
.bar{flex-shrink:0;display:flex;align-items:baseline;gap:12px;padding:10px 16px;padding-top:max(10px,env(safe-area-inset-top));border-bottom:1px solid rgba(255,255,255,.06)}
.bar b{font-size:14px}.bar span{font-size:12px;opacity:.65}
.stage-wrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:16px}

.frame{position:absolute;top:0;left:0;overflow:hidden;border-radius:40px;border:2px solid rgba(255,255,255,.18);background:#0f1115;box-shadow:0 40px 80px rgba(0,0,0,.45),0 12px 32px rgba(0,0,0,.28);transform-origin:top left}
#map{width:100%;height:100%}
.meta{position:absolute;left:16px;top:8px;font-size:12px;opacity:.7;pointer-events:none;z-index:2}
.poi-host{width:max-content;height:max-content;pointer-events:none}
.poi{display:inline-flex;align-items:center;user-select:none}
.poi-icon{flex-shrink:0;width:64px;height:64px;filter:drop-shadow(0 5px 8px rgba(0,0,0,.14))}
.poi-icon img{display:block;width:100%;height:100%;object-fit:contain}
.poi-text{padding-left:4px;max-width:220px;font-weight:500;font-size:24px;line-height:normal;filter:drop-shadow(.5px 3px 5px rgba(0,0,0,.1));paint-order:stroke fill;-webkit-text-stroke:5px #fff;overflow-wrap:anywhere}
.err{display:none;position:fixed;left:12px;right:12px;bottom:12px;z-index:9;padding:10px 12px;border-radius:8px;background:rgba(180,0,0,.85);color:#fff;font-size:13px}
</style>
</head>

const THEME = {
  background:'#ECF3F8', park:'#B2ECA5', water:'#84D4F9',
  primaryRoad:'#B0C2D0', primaryRoadCasing:'#9BB0C2',
  secondaryRoad:'#D5D9DE', secondaryRoadCasing:'#C8CCD1',
  building:'#E2EAF0', buildingOutline:'#D0DAE2',
  aeroway:'#B8C6D4', boundary:'#D4D7DB', label:'#4A4F56', labelHalo:'#ECF3F8'
};
const PHONE_W = 880, PHONE_H = 1912, STYLE_URLS = [
  'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json',
  'https://demotiles.maplibre.org/style.json'
];

function showErr(m){const e=document.getElementById('err');e.style.display='block';e.textContent=m}
window.addEventListener('error', ev => showErr('加载失败：'+(ev.message||'请检查网络（需能访问 unpkg / carto 底图）')));

function layoutPhone(){
  const stage=document.getElementById('stage');
  const slot=document.getElementById('slot');
  const frame=document.getElementById('frame');
  const pad=16;
  const aw=Math.max(0, stage.clientWidth-pad*2);
  const ah=Math.max(0, stage.clientHeight-pad*2);
  const scale=Math.max(0.05, Math.min(aw/PHONE_W, ah/PHONE_H));
  slot.style.width=PHONE_W*scale+'px';
  slot.style.height=PHONE_H*scale+'px';
  frame.style.width=PHONE_W+'px';
  frame.style.height=PHONE_H+'px';
  frame.style.transform='scale('+scale+')';
  document.getElementById('meta').textContent=PHONE_W+' × '+PHONE_H+' · '+Math.round(scale*100)+'%';
  if (window.__map) { window.__map.resize(); requestAnimationFrame(()=>refreshVisibility('zoom')); }
}

function isLabel(id,type){if(type!=='symbol')return false;id=id.toLowerCase();return id.includes('label')||id.startsWith('place_')||id.includes('roadname')||id.includes('housenumber')||id.startsWith('poi_')||id.startsWith('watername_')}
function isCasing(id){id=id.toLowerCase();return id.includes('casing')||id.includes('_case')}
function paints(layerId,type,c){
  const id=layerId.toLowerCase(), out=[];
  if(type==='background'||id.includes('background')){out.push(['background-color',c.background]);return out}
  if(id.includes('landcover')||id.startsWith('park_')||(id.includes('park')&&type==='fill'&&!id.includes('poi'))){if(type==='fill')out.push(['fill-color',c.park]);return out}
  if(id.includes('landuse')&&type==='fill'){const g=id.includes('grass')||id.includes('wood')||id.includes('forest')||id.includes('park')||id.includes('cemetery');out.push(['fill-color',g?c.park:c.background]);return out}
  if(isLabel(layerId,type)){out.push(['text-color',c.label],['text-halo-color',c.labelHalo]);return out}
  if(id.includes('water')||id.includes('waterway')){if(type==='fill'||type==='background')out.push(['fill-color',c.water]);else if(type==='line')out.push(['line-color',c.water]);return out}
  if(id.includes('road')||id.includes('highway')||id.includes('tunnel')||id.includes('bridge')||id.includes('rail')){
    if(type!=='line')return out;
    const major=id.includes('motorway')||id.includes('mot_')||id.includes('trunk')||(id.includes('primary')&&!id.includes('secondary'));
    const casing=isCasing(layerId);
    if(major){out.push(['line-color',casing?(c.primaryRoadCasing||c.primaryRoad):c.primaryRoad]);return out}
    out.push(['line-color',casing?(c.secondaryRoadCasing||c.secondaryRoad||c.primaryRoad):(c.secondaryRoad||c.primaryRoad)]);return out
  }
  if(id.includes('aeroway')&&type==='line'){out.push(['line-color',c.aeroway]);return out}
  if(id.includes('building')&&type==='fill'){out.push(['fill-color',c.building]);return out}
  if(id.includes('boundary')&&type==='line')out.push(['line-color',c.boundary]);
  return out;
}
function applyTheme(map,c){
  for(const layer of map.getStyle()?.layers||[]){
    try{
      for(const [prop,val] of paints(layer.id,layer.type,c)) map.setPaintProperty(layer.id,prop,val);
      if(layer.id.toLowerCase().startsWith('poi_')&&layer.type==='symbol') map.setLayoutProperty(layer.id,'visibility','none');
    }catch(_){}
  }
}
function createPoiEl(poi){
  const preset=PRESETS[poi.category]||PRESETS.food;
  const icon=POI_ICONS[poi.category]||POI_ICONS.food;
  const host=document.createElement('div');
  host.className='poi-host';
  host.innerHTML='<div class="poi"><div class="poi-icon"><img alt="" width="64" height="64" src="'+icon+'"/></div><div class="poi-text" style="color:'+preset.textColor+'">'+poi.title+'</div></div>';
  return host;
}
function overlap(a,b){return !(a.right<b.left||a.left>b.right||a.bottom<b.top||a.top>b.bottom)}
function partsAt(map,lng,lat){
  const p=map.project([lng,lat]), pad=4;
  return {
    icon:{left:p.x-32-pad,right:p.x+32+pad,top:p.y-32-pad,bottom:p.y+32+pad},
    label:{left:p.x+36-pad,right:p.x+236+pad,top:p.y-16-pad,bottom:p.y+16+pad}
  };
}
function collide(a,b){return overlap(a.icon,b.icon)||overlap(a.label,b.label)||overlap(a.icon,b.label)||overlap(a.label,b.icon)}
function near(map,lng,lat,m){
  const p=map.project([lng,lat]), c=map.getCanvas(), w=c.clientWidth||c.width, h=c.clientHeight||c.height;
  return p.x>=-w*m&&p.x<=w+w*m&&p.y>=-h*m&&p.y<=h+h*m;
}
const markers=new Map();
let sticky=new Set(), lastZoom=15.35;
function resolveVisible(map, stickySet, recheck){
  const visible=new Set(), kept=[], byId=new Map(POIS.map(p=>[p.id,p]));
  if(stickySet&&stickySet.size){
    const list=[...stickySet].map(id=>byId.get(id)).filter(p=>p&&near(map,p.lngLat[0],p.lngLat[1],0.35));
    if(recheck){
      list.sort((a,b)=>b.priority-a.priority||a.id.localeCompare(b.id));
      for(const poi of list){const parts=partsAt(map,poi.lngLat[0],poi.lngLat[1]); if(kept.some(k=>collide(parts,k.parts)))continue; kept.push({id:poi.id,parts}); visible.add(poi.id)}
    } else {
      for(const poi of list){kept.push({id:poi.id,parts:partsAt(map,poi.lngLat[0],poi.lngLat[1])}); visible.add(poi.id)}
    }
  }
  for(const poi of POIS.filter(p=>!visible.has(p.id)&&near(map,p.lngLat[0],p.lngLat[1],0.05)).sort((a,b)=>b.priority-a.priority||a.id.localeCompare(b.id))){
    const parts=partsAt(map,poi.lngLat[0],poi.lngLat[1]); if(kept.some(k=>collide(parts,k.parts)))continue; kept.push({id:poi.id,parts}); visible.add(poi.id);
  }
  return visible;
}
function refreshVisibility(mode){
  const map=window.__map; if(!map)return;
  const z=map.getZoom(), zoomChanged=Math.abs(z-lastZoom)>0.02;
  const recheck=mode==='zoom'||mode==='full'||zoomChanged;
  sticky=resolveVisible(map, mode==='full'?undefined:sticky, recheck);
  lastZoom=z;
  for(const [id,h] of markers) h.el.style.display=sticky.has(id)?'':'none';
}
function mountPois(map){
  for(const poi of POIS){
    if(markers.has(poi.id))continue;
    const el=createPoiEl(poi); el.style.display='none';
    const marker=new maplibregl.Marker({element:el,anchor:'left',offset:[-32,0]}).setLngLat(poi.lngLat).addTo(map);
    markers.set(poi.id,{marker,el});
  }
}

if(!window.maplibregl){showErr('MapLibre 加载失败，请检查网络');}
else {
  layoutPhone();
  let styleIndex=0;
  const map=new maplibregl.Map({container:'map', style:STYLE_URLS[0], center:[116.468,39.988], zoom:15.35, attributionControl:true});
  window.__map=map;
  map.addControl(new maplibregl.NavigationControl({visualizePitch:false}),'top-right');
  const paint=()=>{applyTheme(map,THEME); map.resize(); mountPois(map); refreshVisibility('full')};
  map.on('load',paint); map.on('style.load',paint);
  map.on('move',()=>{if(!map.isZooming())refreshVisibility('pan')});
  map.on('zoom',()=>refreshVisibility('zoom'));
  map.on('zoomend',()=>refreshVisibility('zoom'));
  map.on('error', e=>{
    const msg=String(e?.error?.message||e||'');
    if(/source|sprite|glyph|tile|style/i.test(msg)&&styleIndex<STYLE_URLS.length-1){styleIndex++; map.setStyle(STYLE_URLS[styleIndex])}
  });
  window.addEventListener('resize', layoutPhone);
  window.addEventListener('orientationchange', ()=>setTimeout(layoutPhone,200));
}
