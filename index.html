<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>地图换肤 · 手机预览</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"/>
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;font-family:"PingFang SC","Hiragino Sans GB","Noto Sans SC",-apple-system,BlinkMacSystemFont,sans-serif;background:#1c1f26;color:#c8cdd6}
.page{height:100%;height:100dvh;display:flex;flex-direction:column;background:radial-gradient(ellipse 70% 55% at 35% 40%,#2a3140 0%,transparent 70%),#1c1f26}
.bar{flex-shrink:0;display:flex;flex-wrap:wrap;align-items:baseline;gap:10px 14px;padding:10px 16px;padding-top:max(10px,env(safe-area-inset-top));border-bottom:1px solid rgba(255,255,255,.06)}
.bar b{font-size:14px}.bar span{font-size:12px;opacity:.65}
#hint{font-size:11px;opacity:.75;width:100%}
.stage-wrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:16px;position:relative}
.stage-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;max-width:100%;max-height:100%}
.meta{position:absolute;left:16px;top:8px;font-size:12px;opacity:.7;pointer-events:none;z-index:2}
.slot{position:relative;flex-shrink:0}
.frame{position:absolute;top:0;left:0;overflow:hidden;border-radius:40px;border:2px solid rgba(255,255,255,.18);background:#0f1115;box-shadow:0 40px 80px rgba(0,0,0,.45),0 12px 32px rgba(0,0,0,.28);transform-origin:top left}
#map{width:100%;height:100%}
.poi-marker-host{width:max-content;height:max-content;pointer-events:none}
:root{--poi-s:1}
.poi-style{
  display:inline-flex;align-items:center;user-select:none;
  --poi-text-color:#bb3e00;
  /* 用 :root 的 --poi-s；此处勿再写 --poi-s:1，否则手机缩放失效 */
  --poi-icon:calc(64px * var(--poi-s));
  --poi-font:calc(24px * var(--poi-s));
  --poi-stroke:calc(2.8px * var(--poi-s));
  --poi-pad:calc(3px * var(--poi-s));
  --poi-shadow:calc(.4px * var(--poi-s)) calc(1.5px * var(--poi-s)) calc(2.5px * var(--poi-s)) rgba(0,0,0,.12);
  --poi-label-max:calc(200px * var(--poi-s));
}
.poi-style__icon{flex-shrink:0;width:var(--poi-icon);height:var(--poi-icon);overflow:visible}
.poi-style__icon img{display:block;width:100%;height:100%;object-fit:contain}
.poi-style__text{
  padding-left:var(--poi-pad);max-width:var(--poi-label-max);
  font-family:"PingFang SC","Hiragino Sans GB","Noto Sans SC",sans-serif;
  font-weight:700;font-style:normal;
  color:var(--poi-text-color);line-height:normal;
  filter:drop-shadow(var(--poi-shadow));overflow-wrap:anywhere;
}
.poi-style__title{
  margin:0;font-size:var(--poi-font);font-weight:700;
  paint-order:stroke fill;
  -webkit-text-stroke:var(--poi-stroke) rgba(255,255,255,.9);
}
.err{display:none;position:fixed;left:12px;right:12px;bottom:12px;z-index:9;padding:10px 12px;border-radius:8px;background:rgba(180,0,0,.85);color:#fff;font-size:13px}

/* 主题切换：手机框底部横排 */
.theme-dock{
  flex-shrink:0;z-index:20;
  display:flex;flex-direction:row;gap:6px;
  width:min(100%,420px);padding:8px;
  border-radius:12px;
  background:rgba(28,31,38,.92);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.theme-dock button{
  flex:1;min-width:0;min-height:36px;padding:6px 2px;
  border:1px solid rgba(255,255,255,.18);border-radius:8px;
  background:rgba(255,255,255,.08);color:#e8eaed;
  font-size:10px;font-weight:600;line-height:1.2;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;
}
.theme-dock button.active{
  background:#fff4ec;border-color:#bb3e00;color:#bb3e00;
}

@media (max-width: 720px) {
  .bar{display:none}
  .stage-wrap{padding:0;flex:1;min-height:0;display:flex;flex-direction:column}
  .stage-inner{width:100%;height:100%;gap:0;flex:1;min-height:0;flex-direction:column}
  .meta{display:none}
  .slot{flex:1;min-height:0;width:100%!important}
  .slot,.frame{position:static!important;width:100%!important;height:100%!important;transform:none!important;border:none!important;border-radius:0!important;box-shadow:none!important}
  #map{width:100%;height:100%}
  .theme-dock{
    position:relative;width:100%;max-width:none;
    border-radius:0;border:none;border-top:1px solid rgba(255,255,255,.1);
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    gap:4px;
  }
  .theme-dock button{min-height:34px;font-size:10px;padding:6px 1px;white-space:normal;line-height:1.15}
  :root{--poi-s:.83}
}
</style>
</head>

  [/小区|家园|里$|公寓|大厦|广场|中心$|SOHO|社区|苑$|园\d|西里|东里|北里|南里/,'residential'],
];
function inferPoiCategory(name, osmClass, subclass){
  const cls=(osmClass||'').toLowerCase(), sub=(subclass||'').toLowerCase();
  if(POI_CLASS_MAP[cls]) return POI_CLASS_MAP[cls];
  if(sub && POI_CLASS_MAP[sub]) return POI_CLASS_MAP[sub];
  const t=(name||'').trim(); if(!t) return null;
  for(const [re,cat] of POI_NAME_RULES){ if(re.test(t)) return cat; }
  return null;
}
function hasHan(t){return /[\u4e00-\u9fff]/.test(t)}
function isLatinOnly(t){t=(t||'').trim(); if(!t)return true; if(hasHan(t))return false; return /^[\sA-Za-z0-9'’\-.,&()/]+$/.test(t)}
function pickChinesePoiName(props){
  const keys=['name:zh-Hans','name:zh','name_zh-Hans','name_zh','name:zh-Hant','name_zh-Hant','name:zh-CN','name_zh-CN','name'];
  for(const k of keys){ const raw=props[k]; if(typeof raw!=='string')continue; const n=raw.trim(); if(n&&hasHan(n))return n; }
  return null;
}


const POI_ZOOM_500M=14, POI_ZOOM_200M=15, POI_ZOOM_100M=16, POI_ZOOM_MIN=0;
function isMobilePreview(){return window.matchMedia('(max-width: 720px)').matches}
/** 手机网页：大比例尺（500m/100m）再缩小，贴近编辑器预览观感 */
function computePoiUiScale(zoom){
  if(!isMobilePreview()) return 1;
  /* 在上一版基础上 ×1.8 */
  if(zoom>=16) return 0.76; /* ~100m */
  if(zoom>=15) return 0.79; /* ~200m */
  if(zoom>=14) return 0.83; /* ~500m */
  if(zoom>=13) return 0.86; /* ~1km */
  return 0.90; /* 城市级 */
}
let POI_UI_SCALE = computePoiUiScale(typeof VIEW!=='undefined'&&VIEW.zoom!=null?VIEW.zoom:15);
let POI_HALF = 32 * POI_UI_SCALE;
const POI_ICON_COLLISION_BOX={left:POI_HALF,right:POI_HALF,top:POI_HALF,bottom:POI_HALF,pad:4*POI_UI_SCALE};
const POI_LABEL_COLLISION_BOX={left:28*POI_UI_SCALE,right:168*POI_UI_SCALE,top:16*POI_UI_SCALE,bottom:16*POI_UI_SCALE,pad:4*POI_UI_SCALE};
function applyPoiCollisionMetrics(){
  POI_HALF = 32 * POI_UI_SCALE;
  POI_ICON_COLLISION_BOX.left=POI_HALF; POI_ICON_COLLISION_BOX.right=POI_HALF;
  POI_ICON_COLLISION_BOX.top=POI_HALF; POI_ICON_COLLISION_BOX.bottom=POI_HALF;
  POI_ICON_COLLISION_BOX.pad=4*POI_UI_SCALE;
  POI_LABEL_COLLISION_BOX.left=28*POI_UI_SCALE; POI_LABEL_COLLISION_BOX.right=168*POI_UI_SCALE;
  POI_LABEL_COLLISION_BOX.top=16*POI_UI_SCALE; POI_LABEL_COLLISION_BOX.bottom=16*POI_UI_SCALE;
  POI_LABEL_COLLISION_BOX.pad=4*POI_UI_SCALE;
}
function syncPoiUiScale(map){
  const next=computePoiUiScale(map.getZoom());
  const changed=Math.abs(next-POI_UI_SCALE)>0.005;
  POI_UI_SCALE=next;
  applyPoiCollisionMetrics();
  document.documentElement.style.setProperty('--poi-s', String(POI_UI_SCALE));
  if(changed){
    for(const [,h] of demoMarkers){ try{h.marker.setOffset([-POI_HALF,0])}catch(_){}}
    for(const [,h] of basemapMarkers){ try{h.marker.setOffset([-POI_HALF,0])}catch(_){}}
  }
  return changed;
}
const BASEMAP_POI_PRIORITY=88;
const PHONE_W=880, PHONE_H=1912;
const STYLE_URLS=['https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json','https://demotiles.maplibre.org/style.json'];

function poiDensityRule(zoom){
  const s=POI_UI_SCALE;
  const g=(px)=>Math.round(px*s);
  const p=(n)=>Math.round(n*s);
  if(zoom<POI_ZOOM_500M) return {gridCellPx:g(200),collisionPadExtra:p(20),minPriority:80};
  if(zoom<POI_ZOOM_200M) return {gridCellPx:g(160),collisionPadExtra:p(18),minPriority:72};
  if(zoom<POI_ZOOM_100M) return {gridCellPx:g(96),collisionPadExtra:p(10),minPriority:52};
  return {gridCellPx:null,collisionPadExtra:0,minPriority:0};
}
function poiGridCellKey(cx,cy,cellPx){return Math.floor(cx/cellPx)+':'+Math.floor(cy/cellPx)}
function boxesOverlap(a,b){return !(a.right<b.left||a.left>b.right||a.bottom<b.top||a.top>b.bottom)}
function boxAt(cx,cy,spec,extra){const pad=spec.pad+extra;return {left:cx-spec.left-pad,right:cx+spec.right+pad,top:cy-spec.top-pad,bottom:cy+spec.bottom+pad}}
function markerPartsAt(map,lng,lat,extra){
  const p=map.project([lng,lat]);
  const icon=boxAt(p.x,p.y,POI_ICON_COLLISION_BOX,extra);
  const pad=POI_LABEL_COLLISION_BOX.pad+extra;
  const labelLeft=p.x+POI_HALF+4*POI_UI_SCALE-pad;
  const labelW=200*POI_UI_SCALE;
  const labelHalfH=16*POI_UI_SCALE;
  return {icon, label:{left:labelLeft,right:labelLeft+labelW+pad*2,top:p.y-labelHalfH-pad,bottom:p.y+labelHalfH+pad}};
}
function partsCollide(a,b){return boxesOverlap(a.icon,b.icon)||boxesOverlap(a.label,b.label)||boxesOverlap(a.icon,b.label)||boxesOverlap(a.label,b.icon)}
function isNearViewport(map,lng,lat,marginRatio){
  const p=map.project([lng,lat]), c=map.getCanvas(), w=c.clientWidth||c.width, h=c.clientHeight||c.height;
  const mx=w*marginRatio, my=h*marginRatio;
  return p.x>=-mx&&p.x<=w+mx&&p.y>=-my&&p.y<=h+my;
}
function tryKeep(demo,map,density,kept,occupied,visible,useGrid){
  const projected=map.project(demo.lngLat);
  if(useGrid&&density.gridCellPx!=null){const cell=poiGridCellKey(projected.x,projected.y,density.gridCellPx); if(occupied.has(cell)) return false}
  const parts=markerPartsAt(map,demo.lngLat[0],demo.lngLat[1],density.collisionPadExtra);
  if(kept.some(k=>partsCollide(parts,k.parts))) return false;
  kept.push({id:demo.id,parts}); visible.add(demo.id);
  if(useGrid&&density.gridCellPx!=null) occupied.add(poiGridCellKey(projected.x,projected.y,density.gridCellPx));
  return true;
}
function resolveVisiblePoiIds(map, demos, options){
  const zoom=map.getZoom(), density=poiDensityRule(zoom);
  const sticky=options&&options.stickyVisibleIds;
  const recheckSticky=Boolean(options&&options.recheckStickyOnZoom);
  const cullMargin=(options&&options.stickyCullMarginRatio)!=null?options.stickyCullMarginRatio:0.35;
  const byId=new Map(demos.map(d=>[d.id,d]));
  const kept=[], occupied=new Set(), visible=new Set();
  if(sticky&&sticky.size){
    const stickyDemos=[...sticky].map(id=>byId.get(id)).filter(d=>d&&zoom>=d.minZoom&&isNearViewport(map,d.lngLat[0],d.lngLat[1],cullMargin));
    if(recheckSticky){
      stickyDemos.sort((a,b)=>b.priority-a.priority||a.id.localeCompare(b.id));
      for(const demo of stickyDemos) tryKeep(demo,map,density,kept,occupied,visible,true);
    } else {
      for(const demo of stickyDemos){
        const projected=map.project(demo.lngLat);
        const parts=markerPartsAt(map,demo.lngLat[0],demo.lngLat[1],density.collisionPadExtra);
        kept.push({id:demo.id,parts}); visible.add(demo.id);
        if(density.gridCellPx!=null) occupied.add(poiGridCellKey(projected.x,projected.y,density.gridCellPx));
      }
    }
  }
  const newcomers=demos.filter(d=>!visible.has(d.id)&&zoom>=d.minZoom&&d.priority>=density.minPriority&&isNearViewport(map,d.lngLat[0],d.lngLat[1],0.05))
    .slice().sort((a,b)=>b.priority-a.priority||a.id.localeCompare(b.id));
  for(const demo of newcomers) tryKeep(demo,map,density,kept,occupied,visible,true);
  return visible;
}

function setBasemapPoiLabelsVisible(map, visible){
  const v=visible?'visible':'none';
  for(const layer of map.getStyle()?.layers||[]){
    if(layer.type!=='symbol') continue;
    if(layer.id.toLowerCase().startsWith('poi_')){
      try{map.setLayoutProperty(layer.id,'visibility',v)}catch(_){}
    }
  }
}
function featurePoint(f){
  const g=f.geometry; if(!g) return null;
  if(g.type==='Point') return [g.coordinates[0],g.coordinates[1]];
  if(g.type==='MultiPoint'&&g.coordinates[0]) return [g.coordinates[0][0],g.coordinates[0][1]];
  return null;
}
function stableBasemapId(name,lng,lat,category){
  const key=category+':'+name+':'+lng.toFixed(5)+','+lat.toFixed(5);
  let hash=0; for(let i=0;i<key.length;i++) hash=(hash*31+key.charCodeAt(i))|0;
  return 'bm-'+Math.abs(hash).toString(36);
}
function nearExisting(lngLat,title,existing,threshold){
  threshold=threshold==null?0.00075:threshold;
  return existing.some(d=>{
    if(d.title===title) return true;
    const dLng=d.lngLat[0]-lngLat[0], dLat=d.lngLat[1]-lngLat[1];
    return dLng*dLng+dLat*dLat<threshold*threshold;
  });
}
function collectBasemapPois(map, demoPois, knownPois){
  knownPois=knownPois||[];
  let features=[];
  try{
    if(!map.getSource('carto')) return [];
    features=map.querySourceFeatures('carto',{sourceLayer:'poi'});
  }catch(_){return []}
  const bounds=map.getBounds();
  const west=bounds.getWest(), east=bounds.getEast(), south=bounds.getSouth(), north=bounds.getNorth();
  const seen=new Set(), out=[];
  for(const f of features){
    const props=f.properties||{};
    const name=pickChinesePoiName(props); if(!name) continue;
    const lngLat=featurePoint(f); if(!lngLat) continue;
    const [lng,lat]=lngLat;
    if(lng<west||lng>east||lat<south||lat>north) continue;
    const category=inferPoiCategory(name, props.class!=null?String(props.class):undefined, props.subclass!=null?String(props.subclass):undefined);
    if(!category) continue;
    const dedupeKey=category+':'+name; if(seen.has(dedupeKey)) continue; seen.add(dedupeKey);
    if(nearExisting(lngLat,name,demoPois)) continue;
    if(nearExisting(lngLat,name,knownPois)) continue;
    if(nearExisting(lngLat,name,out)) continue;
    out.push({id:stableBasemapId(name,lng,lat,category), category, title:name, lngLat, minZoom:POI_ZOOM_MIN, priority:BASEMAP_POI_PRIORITY});
  }
  return out;
}
function isPoiNearMapBounds(map,lngLat,marginRatio){
  marginRatio=marginRatio==null?0.4:marginRatio;
  const bounds=map.getBounds();
  const lngSpan=bounds.getEast()-bounds.getWest(), latSpan=bounds.getNorth()-bounds.getSouth();
  const padLng=lngSpan*marginRatio, padLat=latSpan*marginRatio;
  const [lng,lat]=lngLat;
  return lng>=bounds.getWest()-padLng&&lng<=bounds.getEast()+padLng&&lat>=bounds.getSouth()-padLat&&lat<=bounds.getNorth()+padLat;
}
function isChinesePoiTitle(title){return !isLatinOnly(title)}

function isLabelSymbolLayer(layerId, layerType){
  if(layerType!=='symbol') return false;
  const id=layerId.toLowerCase();
  return id.includes('label')||id.startsWith('place_')||id.includes('roadname')||id.includes('housenumber')||id.startsWith('poi_')||id.startsWith('watername_');
}
function isRoadCasingLayer(layerId){const id=layerId.toLowerCase(); return id.includes('casing')||id.includes('_case')}
function resolveThemePaints(layerId, layerType, config){
  const id=layerId.toLowerCase(), out=[];
  if(layerType==='background'||id==='background'||id.includes('background')){out.push(['background-color',config.background]);return out}
  if(id.includes('landcover')||id.startsWith('park_')||(id.includes('park')&&layerType==='fill'&&!id.includes('poi'))){if(layerType==='fill')out.push(['fill-color',config.park]);return out}
  if(id.includes('landuse')&&layerType==='fill'){const g=id.includes('grass')||id.includes('wood')||id.includes('forest')||id.includes('park')||id.includes('cemetery');out.push(['fill-color',g?config.park:config.background]);return out}
  if(isLabelSymbolLayer(layerId,layerType)){out.push(['text-color',config.label],['text-halo-color',config.labelHalo]);return out}
  if(id.includes('water')||id.includes('waterway')){if(layerType==='fill'||layerType==='background')out.push(['fill-color',config.water]);else if(layerType==='line')out.push(['line-color',config.water]);return out}
  if(id.includes('road')||id.includes('highway')||id.includes('tunnel')||id.includes('bridge')||id.includes('rail')){
    if(layerType!=='line')return out;
    const isMajor=id.includes('motorway')||id.includes('mot_')||id.includes('trunk')||(id.includes('primary')&&!id.includes('secondary'))||(id.includes('pri_')&&!id.includes('sec'));
    const isCasing=isRoadCasingLayer(layerId);
    if(isMajor){out.push(['line-color',isCasing?(config.primaryRoadCasing||config.primaryRoad):config.primaryRoad]);return out}
    out.push(['line-color',isCasing?(config.secondaryRoadCasing||config.secondaryRoad||config.primaryRoad):(config.secondaryRoad||config.primaryRoad)]);return out;
  }
  if(id.includes('aeroway')&&layerType==='line'){out.push(['line-color',config.aeroway]);return out}
  if(id.includes('building')&&layerType==='fill'){out.push(['fill-color',config.building]); if(id.includes('building-top')) out.push(['fill-outline-color',config.buildingOutline||config.background]); return out}
  if(id.includes('boundary')&&layerType==='line') out.push(['line-color',config.boundary]);
  return out;
}
function applyTheme(map,config){
  for(const layer of map.getStyle()?.layers||[]){
    try{ for(const [prop,val] of resolveThemePaints(layer.id,layer.type,config)) map.setPaintProperty(layer.id,prop,val); }catch(_){}
  }
}
function isRoadNameLabelLayer(layerId, layerType){
  if(layerType!=='symbol') return false;
  const id=layerId.toLowerCase();
  return id.includes('roadname')||id.includes('road_name')||id.includes('highway_name')||
    (id.includes('road')&&id.includes('label'))||
    (id.includes('highway')&&(id.includes('name')||id.includes('label')));
}
function boostLegibility(map){
  const mobile=isMobilePreview();
  for(const layer of map.getStyle()?.layers||[]){
    const id=layer.id.toLowerCase();
    try{
      if(layer.type==='line'&&(id.includes('road')||id.includes('highway'))){
        const w=map.getPaintProperty(layer.id,'line-width');
        if(typeof w==='number') map.setPaintProperty(layer.id,'line-width',w*1.6);
      }
      if(isRoadNameLabelLayer(layer.id, layer.type)){
        /* 桌面预览框内 18；手机全屏减半为 9（勿反复 ×0.5） */
        map.setLayoutProperty(layer.id,'text-size', mobile?9:18);
      }
    }catch(_){}
  }
}
/** 底图标注优先中文；无中文名字段则隐藏，避免英文路名/区县名 */
const ZH_TEXT_FIELD=['coalesce',
  ['get','name:zh-Hans'],['get','name:zh'],['get','name_zh'],
  ['get','name:zh-CN'],['get','name:nonlatin'],['get','name_nonlatin'],
  ['get','name:ja'],['get','name']
];
const HAS_ZH=['any',
  ['has','name:zh-Hans'],['has','name:zh'],['has','name_zh'],
  ['has','name:zh-CN'],['has','name:nonlatin'],['has','name_nonlatin']
];
function preferChineseLabels(map){
  for(const layer of map.getStyle()?.layers||[]){
    if(layer.type!=='symbol') continue;
    const id=layer.id.toLowerCase();
    if(id.includes('housenumber')||id.includes('house_number')) continue;
    try{ map.setLayoutProperty(layer.id,'text-field', ZH_TEXT_FIELD); }catch(_){}
    try{
      const needZh=
        id.includes('place')||id.includes('settlement')||id.includes('country')||
        id.includes('state')||id.includes('city')||id.includes('suburb')||
        id.includes('neighbourhood')||id.includes('neighborhood')||
        id.includes('roadname')||id.includes('road_name')||id.includes('watername')||
        id.includes('water_name')||id.includes('transport')||
        (id.includes('label')&&(id.includes('place')||id.includes('road')||id.includes('water')));
      if(needZh){
        /* 仅显示有中文字段的标注，避免英文区名/路名 */
        map.setPaintProperty(layer.id,'text-opacity',[
          'case',
          ['>',['length',['to-string',['coalesce',['get','name:zh-Hans'],['get','name:zh'],['get','name_zh'],['get','name:zh-CN'],['get','name:nonlatin'],'']]],0],1,
          0
        ]);
      }
    }catch(_){}
  }
}

function layoutPhone(){
  const stage=document.getElementById('stage');
  const slot=document.getElementById('slot');
  const frame=document.getElementById('frame');
  const meta=document.getElementById('meta');
  const dock=document.getElementById('themeDock');
  const narrow = isMobilePreview();
  if(narrow){
    slot.style.width='100%';
    slot.style.height='100%';
    frame.style.width='100%';
    frame.style.height='100%';
    frame.style.transform='none';
    if(meta) meta.textContent='';
  } else {
    const pad=16;
    const dockH=(dock?dock.offsetHeight:52)+10;
    const aw=Math.max(0, stage.clientWidth-pad*2);
    const ah=Math.max(0, stage.clientHeight-pad*2-dockH);
    const scale=Math.max(0.05, Math.min(aw/PHONE_W, ah/PHONE_H));
    slot.style.width=(PHONE_W*scale)+'px';
    slot.style.height=(PHONE_H*scale)+'px';
    frame.style.width=PHONE_W+'px';
    frame.style.height=PHONE_H+'px';
    frame.style.transform='scale('+scale+')';
    if(meta) meta.textContent=PHONE_W+' × '+PHONE_H+' · '+Math.round(scale*100)+'%';
  }
  if(window.__map){
    syncPoiUiScale(window.__map);
    window.__map.resize();
    requestAnimationFrame(()=>refreshPoiVisibility('zoom'));
  } else {
    document.documentElement.style.setProperty('--poi-s', String(computePoiUiScale(VIEW.zoom)));
  }
}

function createPoiEl(poi){

  host.innerHTML='<div class="poi-style" style="--poi-text-color:'+preset.textColor+'"><div class="poi-style__icon"><img alt="" width="64" height="64" draggable="false" src="'+icon+'"/></div><div class="poi-style__text"><p class="poi-style__title">'+poi.title+'</p></div></div>';
  return host;
}

const demoMarkers=new Map();
const basemapMarkers=new Map();
let basemapPois=[];
let stickyVisible=new Set();
let lastZoom=VIEW.zoom;
let mapReady=false;

function allPois(){ return DEMO_POIS.concat(basemapPois); }

function refreshPoiVisibility(mode){
  const map=window.__map; if(!map) return;
  const has=demoMarkers.size>0||basemapMarkers.size>0; if(!has) return;
  const zoomNow=map.getZoom();
  const zoomChanged=Math.abs(zoomNow-lastZoom)>0.02;
  const recheck=mode==='zoom'||mode==='full'||zoomChanged;
  const visible=resolveVisiblePoiIds(map, allPois(), {
    stickyVisibleIds: mode==='full'?undefined:stickyVisible,
    recheckStickyOnZoom: recheck,
  });
  stickyVisible=visible;
  lastZoom=zoomNow;
  for(const [id,h] of demoMarkers) h.el.style.display=visible.has(id)?'':'none';
  for(const [id,h] of basemapMarkers) h.el.style.display=visible.has(id)?'':'none';
  const dens=poiDensityRule(zoomNow);
  document.getElementById('hint').textContent=
    'POI策略 · 网格'+(dens.gridCellPx==null?'关':dens.gridCellPx+'px')+
    ' · pad+'+dens.collisionPadExtra+
    ' · minPri '+dens.minPriority+
    ' · 可见 '+visible.size+
    ' · z'+zoomNow.toFixed(1);
}

function mountDemoPois(map){
  for(const poi of DEMO_POIS){
    if(demoMarkers.has(poi.id)) continue;
    const el=createPoiEl(poi); el.style.display='none';
    const marker=new maplibregl.Marker({element:el,anchor:'left',offset:[-POI_HALF,0]}).setLngLat(poi.lngLat).addTo(map);
    demoMarkers.set(poi.id,{marker,el});
  }
}

function syncBasemapPoiMarkers(){
  const map=window.__map; if(!map||!mapReady) return;
  setBasemapPoiLabelsVisible(map,false);
  const known=basemapPois;
  const fresh=collectBasemapPois(map, DEMO_POIS, known);
  const knownIds=new Set(known.map(p=>p.id));
  const merged=known.filter(p=>isPoiNearMapBounds(map,p.lngLat)&&isChinesePoiTitle(p.title))
    .concat(fresh.filter(p=>!knownIds.has(p.id)));
  basemapPois=merged;
  const keepIds=new Set(merged.map(p=>p.id));
  for(const [id,h] of basemapMarkers){
    if(!keepIds.has(id)){ h.marker.remove(); basemapMarkers.delete(id); stickyVisible.delete(id); }
  }
  for(const p of merged){
    if(basemapMarkers.has(p.id)) continue;
    const el=createPoiEl(p); el.style.display='none';
    const marker=new maplibregl.Marker({element:el,anchor:'left',offset:[-POI_HALF,0]}).setLngLat(p.lngLat).addTo(map);
    basemapMarkers.set(p.id,{marker,el});
  }
  refreshPoiVisibility('pan');
}

    mapReady=true;
    mountDemoPois(map);
    refreshPoiVisibility('full');
    syncBasemapPoiMarkers();
  };
  map.on('load', onReady);
  map.on('style.load', ()=>{ applyTheme(map,THEME); boostLegibility(map); preferChineseLabels(map); setBasemapPoiLabelsVisible(map,false); syncPoiUiScale(map); stickyVisible=new Set(); refreshPoiVisibility('full'); syncBasemapPoiMarkers(); });

  map.on('move', ()=>{ if(!map.isZooming()) refreshPoiVisibility('pan'); });
  map.on('zoom', ()=>{ syncPoiUiScale(map); refreshPoiVisibility('zoom'); });
  map.on('moveend', ()=>{ if(!map.isZooming()) syncBasemapPoiMarkers(); });
  map.on('zoomend', ()=>{ syncPoiUiScale(map); refreshPoiVisibility('full'); syncBasemapPoiMarkers(); });
  map.on('sourcedata', (e)=>{ if(e.sourceId==='carto'&&e.isSourceLoaded) syncBasemapPoiMarkers(); });
  map.on('error', e=>{
    const msg=String((e&&e.error&&e.error.message)||e||'');
    if(/source|sprite|glyph|tile|style/i.test(msg)&&styleIndex<STYLE_URLS.length-1){ styleIndex++; map.setStyle(STYLE_URLS[styleIndex]); }
  });
  window.addEventListener('resize', layoutPhone);
  window.addEventListener('orientationchange', ()=>setTimeout(layoutPhone,200));
}

function setTheme(id){
  if(!THEMES[id] || !window.__map) return;
  currentThemeId = id;
  THEME = THEMES[id];
  applyTheme(window.__map, THEME);
  boostLegibility(window.__map);
  setBasemapPoiLabelsVisible(window.__map, false);
  document.querySelectorAll('#themeDock button').forEach(btn=>{
    btn.classList.toggle('active', btn.getAttribute('data-theme')===id);
  });
  const title=document.querySelector('.bar b');
  if(title) title.textContent = (THEME_LABELS[id]||id) + '配色';
}
document.getElementById('themeDock').addEventListener('click', (e)=>{
  const btn = e.target.closest('button[data-theme]');
  if(!btn) return;
  setTheme(btn.getAttribute('data-theme'));
});

</script>
</body>
</html>
