<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>新版配色 · 地图预览</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      #map {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        height: 100dvh;
      }
      .badge {
        position: fixed;
        top: max(12px, env(safe-area-inset-top));
        left: 50%;
        z-index: 2;
        transform: translateX(-50%);
        padding: 6px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.9);
        color: #1a1a1a;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.02em;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        pointer-events: none;
      }
      .hint {
        position: fixed;
        left: 50%;
        bottom: max(16px, env(safe-area-inset-bottom));
        z-index: 2;
        transform: translateX(-50%);
        padding: 6px 12px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.45);
        color: #fff;
        font-size: 12px;
        pointer-events: none;
        opacity: 0.85;
      }

      /* POI 样式 */
      .poi-marker-host {
        width: max-content;
        height: max-content;
        pointer-events: none;
      }
      .poi-style {
        display: inline-flex;
        align-items: center;
        --poi-text-color: #bb3e00;
        user-select: none;
      }
      .poi-style__icon {
        flex-shrink: 0;
        width: 64px;
        height: 64px;
        overflow: hidden;
        filter: drop-shadow(0 5px 8px rgba(0, 0, 0, 0.14));
      }
      .poi-style__icon img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .poi-style__text {
        padding-left: 4px;
        max-width: 220px;
        font-family: 'PingFang SC', 'Hiragino Sans GB', 'Noto Sans SC', sans-serif;
        font-weight: 500;
        color: var(--poi-text-color);
        line-height: normal;
        filter: drop-shadow(0.5px 3px 5px rgba(0, 0, 0, 0.1));
        overflow-wrap: anywhere;
      }
      .poi-style__title {
        margin: 0;
        font-size: 24px;
        paint-order: stroke fill;
        -webkit-text-stroke: 5px #ffffff;
      }
    </style>
  </head>
  <body>
    <div class="badge">新版配色</div>
    <div id="map"></div>
    <div class="hint">双指缩放 · 单指拖动</div>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script>
      /** 新版配色（color2） */
      const THEME = {
        background: '#ECF3F8',
        park: '#B2ECA5',
        water: '#84D4F9',
        primaryRoad: '#B0C2D0',
        primaryRoadCasing: '#9BB0C2',
        secondaryRoad: '#D5D9DE',
        secondaryRoadCasing: '#C8CCD1',
        building: '#E2EAF0',
        buildingOutline: '#D0DAE2',
        aeroway: '#B8C6D4',
        boundary: '#D4D7DB',
        label: '#4A4F56',
        labelHalo: '#ECF3F8',
      };

      const PRESETS = {
        food: { textColor: '#BB3E00', icon: 'poi/food.svg' },
        entertainment: { textColor: '#AF2776', icon: 'poi/entertainment.svg' },
        shopping: { textColor: '#872CB5', icon: 'poi/shopping.svg' },
        hotel: { textColor: '#4138D5', icon: 'poi/hotel.svg' },
        gasStation: { textColor: '#0E5DCF', icon: 'poi/gasStation.svg' },
        school: { textColor: '#0570B5', icon: 'poi/school.svg' },
        charging: { textColor: '#028089', icon: 'poi/charging.svg' },
        park: { textColor: '#168200', icon: 'poi/park.svg' },
        cultureScenic: { textColor: '#664B44', icon: 'poi/cultureScenic.svg' },
        hospital: { textColor: '#B5132E', icon: 'poi/hospital.svg' },
        residential: { textColor: '#435379', icon: 'poi/residential.svg' },
        starbucks: { textColor: '#435379', icon: 'poi/starbucks.svg' },
      };

      const PRI = {
        park: 100,
        cultureScenic: 98,
        school: 95,
        hospital: 85,
        food: 75,
        starbucks: 70,
        residential: 65,
        hotel: 62,
        shopping: 58,
        entertainment: 55,
        gasStation: 45,
        charging: 45,
      };

      /** 望京一带演示 POI（200m + 100m） */
      const POIS = [
        { id: 'wj-park-nanhu', category: 'park', title: '南湖公园', lngLat: [116.4612, 39.9968] },
        { id: 'wj-park-side', category: 'park', title: '四得公园', lngLat: [116.4825, 39.9782] },
        { id: 'wj-shop-kaidemall', category: 'shopping', title: '凯德MALL', lngLat: [116.4688, 39.9935], priority: 63 },
        { id: 'wj-shop-ikea', category: 'shopping', title: '宜家家居', lngLat: [116.4695, 39.9768] },
        { id: 'wj-shop-siyuan', category: 'shopping', title: '四元桥购物中心', lngLat: [116.4672, 39.9755] },
        { id: 'wj-food-sijiminfu', category: 'food', title: '四季民福烤鸭店', lngLat: [116.4608, 39.9952] },
        { id: 'wj-food-ziguang', category: 'food', title: '紫光园·烤鸭', lngLat: [116.4655, 39.9908] },
        { id: 'wj-food-meizhou', category: 'food', title: '眉州东坡酒楼', lngLat: [116.4712, 39.9915] },
        { id: 'wj-sch-cafa', category: 'school', title: '中央美术学院', lngLat: [116.4658, 39.9882] },
        { id: 'wj-sch-shou-shida', category: 'school', title: '首都师大附属实验学校', lngLat: [116.4565, 39.9885] },
        { id: 'wj-sch-qingnian', category: 'school', title: '北京青年政治学院', lngLat: [116.4628, 39.9785] },
        { id: 'wj-res-wangjing4', category: 'residential', title: '望京西园四区', lngLat: [116.4725, 39.9955] },
        { id: 'wj-res-huajiadi', category: 'residential', title: '花家地北里', lngLat: [116.4682, 39.9858] },
        { id: 'wj-res-wanghua', category: 'residential', title: '望花路西里', lngLat: [116.4585, 39.9922] },
        { id: 'wj-res-nanhu', category: 'residential', title: '南湖中园', lngLat: [116.4598, 39.9975] },
        { id: 'wj-res-gaojiayuan', category: 'residential', title: '高家园社区', lngLat: [116.4785, 39.9895] },
        { id: 'wj-hosp-wangjing', category: 'hospital', title: '望京医院', lngLat: [116.4782, 39.9885] },
        { id: 'wj-hotel-hyatt', category: 'hotel', title: '凯悦酒店', lngLat: [116.4745, 39.9928] },
        { id: 'wj-office-siemens', category: 'residential', title: '西门子大厦', lngLat: [116.4778, 39.9892] },
        { id: 'wj-office-fazhi', category: 'residential', title: '法治日报', lngLat: [116.4705, 39.9875] },
        { id: 'wj100-park-shoukai', category: 'park', title: '首开运动公园', lngLat: [116.4818, 39.9945] },
        { id: 'wj100-park-central', category: 'park', title: '中央公园', lngLat: [116.4855, 39.9925] },
        { id: 'wj100-park-hequ', category: 'park', title: '和趣园', lngLat: [116.4882, 39.9912] },
        { id: 'wj100-shop-qilin', category: 'shopping', title: '合生·麒麟新天地', lngLat: [116.4812, 39.9942], priority: 63 },
        { id: 'wj100-food-pingjie', category: 'food', title: '萍姐火锅·公路夜市', lngLat: [116.4798, 39.9935] },
        { id: 'wj100-food-ziguang', category: 'food', title: '紫光园·烤鸭', lngLat: [116.4825, 39.9928] },
        { id: 'wj100-food-xiangzhu', category: 'food', title: '香猪坊炸猪排', lngLat: [116.4842, 39.9918] },
        { id: 'wj100-food-wuji', category: 'food', title: '吴记潮汕小馆', lngLat: [116.4865, 39.9905] },
        { id: 'wj100-food-haidilao', category: 'food', title: '海底捞', lngLat: [116.4805, 39.9915] },
        { id: 'wj100-res-wj3', category: 'residential', title: '望京西园三区', lngLat: [116.4878, 39.9945] },
        { id: 'wj100-res-botai', category: 'residential', title: '博泰大厦', lngLat: [116.4848, 39.9958] },
        { id: 'wj100-res-lixing', category: 'residential', title: '利星行中心', lngLat: [116.4828, 39.9975] },
        { id: 'wj100-res-shoukai', category: 'residential', title: '首开广场', lngLat: [116.4795, 39.9962] },
        { id: 'wj100-sch-80', category: 'school', title: '八十中望京实验学校', lngLat: [116.4818, 39.9902] },
        { id: 'wj100-sch-baijia', category: 'school', title: '白家庄小学', lngLat: [116.4852, 39.9895] },
        { id: 'wj100-hotel-hyatt', category: 'hotel', title: '凯悦酒店', lngLat: [116.4748, 39.9925] },
        { id: 'wj100-starbucks', category: 'starbucks', title: '星巴克', lngLat: [116.4835, 39.9938] },
        { id: 'wj100-gas', category: 'gasStation', title: '中国石化加油站', lngLat: [116.4782, 39.9948] },
        { id: 'wj100-charging', category: 'charging', title: '特来电充电站', lngLat: [116.4868, 39.9922] },
      ].map((p) => ({
        ...p,
        priority: p.priority ?? PRI[p.category] ?? 50,
      }));

      const STYLE_URLS = [
        'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json',
        'https://demotiles.maplibre.org/style.json',
      ];

      function isLabelSymbolLayer(layerId, layerType) {
        if (layerType !== 'symbol') return false;
        const id = layerId.toLowerCase();
        return (
          id.includes('label') ||
          id.startsWith('place_') ||
          id.includes('roadname') ||
          id.includes('housenumber') ||
          id.startsWith('poi_') ||
          id.startsWith('watername_')
        );
      }

      function isRoadCasingLayer(layerId) {
        const id = layerId.toLowerCase();
        return id.includes('casing') || id.includes('_case');
      }

      function resolveThemePaints(layerId, layerType, config) {
        const id = layerId.toLowerCase();
        const out = [];
        if (layerType === 'background' || id === 'background' || id.includes('background')) {
          out.push({ property: 'background-color', value: config.background });
          return out;
        }
        if (
          id.includes('landcover') ||
          id.startsWith('park_') ||
          (id.includes('park') && layerType === 'fill' && !id.includes('poi'))
        ) {
          if (layerType === 'fill') out.push({ property: 'fill-color', value: config.park });
          return out;
        }
        if (id.includes('landuse') && layerType === 'fill') {
          const green =
            id.includes('grass') ||
            id.includes('wood') ||
            id.includes('forest') ||
            id.includes('park') ||
            id.includes('cemetery');
          out.push({ property: 'fill-color', value: green ? config.park : config.background });
          return out;
        }
        if (isLabelSymbolLayer(layerId, layerType)) {
          out.push({ property: 'text-color', value: config.label });
          out.push({ property: 'text-halo-color', value: config.labelHalo });
          return out;
        }
        if (id.includes('water') || id.includes('waterway')) {
          if (layerType === 'fill' || layerType === 'background') {
            out.push({ property: 'fill-color', value: config.water });
          } else if (layerType === 'line') {
            out.push({ property: 'line-color', value: config.water });
          }
          return out;
        }
        if (
          id.includes('road') ||
          id.includes('highway') ||
          id.includes('tunnel') ||
          id.includes('bridge') ||
          id.includes('rail')
        ) {
          if (layerType !== 'line') return out;
          const isMajor =
            id.includes('motorway') ||
            id.includes('mot_') ||
            id.includes('trunk') ||
            (id.includes('primary') && !id.includes('secondary')) ||
            (id.includes('pri_') && !id.includes('sec'));
          const isCasing = isRoadCasingLayer(layerId);
          if (isMajor) {
            out.push({
              property: 'line-color',
              value: isCasing
                ? config.primaryRoadCasing || config.primaryRoad
                : config.primaryRoad,
            });
            return out;
          }
          const isMinor =
            id.includes('minor') || id.includes('service') || id.includes('path');
          out.push({
            property: 'line-color',
            value: isCasing
              ? config.secondaryRoadCasing || config.secondaryRoad || config.primaryRoad
              : config.secondaryRoad || config.primaryRoad,
          });
          return out;
        }
        if (id.includes('aeroway') && layerType === 'line') {
          out.push({ property: 'line-color', value: config.aeroway });
          return out;
        }
        if (id.includes('building') && layerType === 'fill') {
          out.push({ property: 'fill-color', value: config.building });
          if (id.includes('building-top')) {
            out.push({
              property: 'fill-outline-color',
              value: config.buildingOutline || config.background,
            });
          }
          return out;
        }
        if (id.includes('boundary') && layerType === 'line') {
          out.push({ property: 'line-color', value: config.boundary });
        }
        return out;
      }

      function applyTheme(map, config) {
        const layers = map.getStyle()?.layers || [];
        for (const layer of layers) {
          try {
            const paints = resolveThemePaints(layer.id, layer.type, config);
            for (const paint of paints) {
              if (!paint.value) continue;
              map.setPaintProperty(layer.id, paint.property, paint.value);
            }
          } catch (_) {}
        }
      }

      function hideBasemapPoiLabels(map) {
        const layers = map.getStyle()?.layers || [];
        for (const layer of layers) {
          if (layer.type !== 'symbol') continue;
          if (layer.id.toLowerCase().startsWith('poi_')) {
            try {
              map.setLayoutProperty(layer.id, 'visibility', 'none');
            } catch (_) {}
          }
        }
      }

      function boostLegibility(map) {
        const layers = map.getStyle()?.layers || [];
        for (const layer of layers) {
          const id = layer.id.toLowerCase();
          try {
            if (layer.type === 'line' && (id.includes('road') || id.includes('highway'))) {
              const w = map.getPaintProperty(layer.id, 'line-width');
              if (typeof w === 'number') {
                map.setPaintProperty(layer.id, 'line-width', w * 1.6);
              }
            }
            if (layer.type === 'symbol' && id.includes('roadname')) {
              map.setLayoutProperty(layer.id, 'text-size', 18);
            }
          } catch (_) {}
        }
      }

      function createPoiEl(poi) {
        const preset = PRESETS[poi.category] || PRESETS.food;
        const host = document.createElement('div');
        host.className = 'poi-marker-host';
        host.innerHTML =
          '<div class="poi-style" style="--poi-text-color:' +
          preset.textColor +
          '">' +
          '<div class="poi-style__icon"><img src="' +
          preset.icon +
          '" width="64" height="64" alt="" draggable="false"/></div>' +
          '<div class="poi-style__text"><p class="poi-style__title">' +
          poi.title +
          '</p></div></div>';
        return host;
      }

      function boxesOverlap(a, b) {
        return !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);
      }

      function markerPartsAt(map, lng, lat) {
        const p = map.project([lng, lat]);
        const pad = 4;
        return {
          icon: {
            left: p.x - 32 - pad,
            right: p.x + 32 + pad,
            top: p.y - 32 - pad,
            bottom: p.y + 32 + pad,
          },
          label: {
            left: p.x + 32 + 4 - pad,
            right: p.x + 32 + 4 + 200 + pad,
            top: p.y - 16 - pad,
            bottom: p.y + 16 + pad,
          },
        };
      }

      function partsCollide(a, b) {
        return (
          boxesOverlap(a.icon, b.icon) ||
          boxesOverlap(a.label, b.label) ||
          boxesOverlap(a.icon, b.label) ||
          boxesOverlap(a.label, b.icon)
        );
      }

      function isNearViewport(map, lng, lat, marginRatio) {
        const p = map.project([lng, lat]);
        const canvas = map.getCanvas();
        const w = canvas.clientWidth || canvas.width;
        const h = canvas.clientHeight || canvas.height;
        const mx = w * marginRatio;
        const my = h * marginRatio;
        return p.x >= -mx && p.x <= w + mx && p.y >= -my && p.y <= h + my;
      }

      function resolveVisible(map, sticky, recheck) {
        const visible = new Set();
        const kept = [];
        const byId = new Map(POIS.map((p) => [p.id, p]));

        if (sticky && sticky.size) {
          const stickyList = [...sticky]
            .map((id) => byId.get(id))
            .filter((p) => p && isNearViewport(map, p.lngLat[0], p.lngLat[1], 0.35));

          if (recheck) {
            stickyList.sort((a, b) => b.priority - a.priority || a.id.localeCompare(b.id));
            for (const poi of stickyList) {
              const parts = markerPartsAt(map, poi.lngLat[0], poi.lngLat[1]);
              if (kept.some((k) => partsCollide(parts, k.parts))) continue;
              kept.push({ id: poi.id, parts });
              visible.add(poi.id);
            }
          } else {
            for (const poi of stickyList) {
              kept.push({
                id: poi.id,
                parts: markerPartsAt(map, poi.lngLat[0], poi.lngLat[1]),
              });
              visible.add(poi.id);
            }
          }
        }

        const newcomers = POIS.filter(
          (p) =>
            !visible.has(p.id) && isNearViewport(map, p.lngLat[0], p.lngLat[1], 0.05),
        ).sort((a, b) => b.priority - a.priority || a.id.localeCompare(b.id));

        for (const poi of newcomers) {
          const parts = markerPartsAt(map, poi.lngLat[0], poi.lngLat[1]);
          if (kept.some((k) => partsCollide(parts, k.parts))) continue;
          kept.push({ id: poi.id, parts });
          visible.add(poi.id);
        }
        return visible;
      }

      let styleIndex = 0;
      const map = new maplibregl.Map({
        container: 'map',
        style: STYLE_URLS[0],
        center: [116.468, 39.988],
        zoom: 15.35,
        attributionControl: true,
      });

      map.addControl(new maplibregl.NavigationControl({ visualizePitch: false }), 'top-right');

      const markers = new Map();
      let stickyVisible = new Set();
      let lastZoom = map.getZoom();

      function mountPois() {
        for (const poi of POIS) {
          if (markers.has(poi.id)) continue;
          const el = createPoiEl(poi);
          el.style.display = 'none';
          const marker = new maplibregl.Marker({
            element: el,
            anchor: 'left',
            offset: [-32, 0],
          })
            .setLngLat(poi.lngLat)
            .addTo(map);
          markers.set(poi.id, { marker, el });
        }
      }

      function refreshVisibility(mode) {
        const zoomNow = map.getZoom();
        const zoomChanged = Math.abs(zoomNow - lastZoom) > 0.02;
        const recheck = mode === 'zoom' || mode === 'full' || zoomChanged;
        const visible = resolveVisible(
          map,
          mode === 'full' ? undefined : stickyVisible,
          recheck,
        );
        stickyVisible = visible;
        lastZoom = zoomNow;
        for (const [id, handle] of markers) {
          handle.el.style.display = visible.has(id) ? '' : 'none';
        }
      }

      const paint = () => {
        applyTheme(map, THEME);
        hideBasemapPoiLabels(map);
        boostLegibility(map);
        map.resize();
        mountPois();
        refreshVisibility('full');
      };

      map.on('load', paint);
      map.on('style.load', paint);

      map.on('move', () => {
        if (map.isZooming()) return;
        refreshVisibility('pan');
      });
      map.on('zoom', () => refreshVisibility('zoom'));
      map.on('zoomend', () => refreshVisibility('zoom'));

      map.on('error', (e) => {
        const msg = String(e?.error?.message || e || '');
        if (/source|sprite|glyph|tile|style/i.test(msg) && styleIndex < STYLE_URLS.length - 1) {
          styleIndex += 1;
          map.setStyle(STYLE_URLS[styleIndex]);
        }
      });

      window.addEventListener('resize', () => {
        map.resize();
        requestAnimationFrame(() => refreshVisibility('zoom'));
      });
      window.addEventListener('orientationchange', () =>
        setTimeout(() => {
          map.resize();
          refreshVisibility('zoom');
        }, 200),
      );
    </script>
  </body>
</html>
